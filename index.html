<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌽 ㅇ-ㅇ 당신의 하드웨어 감염되다 간디 펜데믹! ㅇ-ㅇ 🌽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --bg2: #0e0e1c;
  --panel: #111120;
  --panel2: #16162a;
  --border: #252540;
  --border2: #3a3a60;
  --accent: #f5c842;
  --accent-dim: #8a700a;
  --green: #3ddc84;
  --green-dim: #1a5a38;
  --purple: #a855f7;
  --purple-dim: #4a1070;
  --red: #ef4444;
  --red-dim: #5a0a0a;
  --orange: #fb923c;
  --orange-dim: #7a3010;
  --text: #dde0f0;
  --text-dim: #5a5a80;
  --text-mid: #9090b0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 60% 40% at 15% 0%, rgba(168,85,247,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 50% 30% at 85% 100%, rgba(61,220,132,0.05) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.011) 3px, rgba(255,255,255,0.011) 4px);
}
.wrap { max-width: 1100px; margin: 0 auto; padding: 8px; }

/* TITLE */
.title-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; background: var(--panel);
  border: 2px solid var(--border2); margin-bottom: 8px;
}
.title-bar h1 { font-size: 13px; color: var(--accent); text-shadow: 0 0 16px rgba(245,200,66,0.5); }
.save-ind { font-size: 7px; color: var(--text-dim); transition: color 0.3s; }
.save-ind.flash { color: var(--green); }

/* HUD */
.hud { display: grid; grid-template-columns: 1.4fr 1.6fr 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.hud-box { background: var(--panel); border: 2px solid var(--border); padding: 10px 12px; }
.hud-label { font-size: 7px; color: var(--text-dim); margin-bottom: 5px; }
.hud-val { font-size: 12px; }
.hud-val.money  { color: var(--accent); }
.hud-val.sp     { color: var(--purple); }
.hud-val.rp     { color: var(--orange); }
.hud-sub { font-size: 6px; color: var(--text-dim); margin-top: 4px; }
.gandhi-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
.gandhi-cnt { font-size: 11px; color: var(--purple); }
.gandhi-tmr { font-size: 7px; color: var(--text-dim); }
.bar-track { height: 7px; background: var(--bg); border: 1px solid var(--border2); position: relative; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #a855f7, #c084fc); transition: width 0.35s; }
.bar-fill::after {
  content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 4px;
  background: white; opacity: 0.6; animation: blip 1.2s ease-in-out infinite;
}
@keyframes blip { 0%,100%{opacity:0.15} 50%{opacity:0.85} }

/* MAIN */
.main-layout { display: grid; grid-template-columns: 1fr 300px; gap: 8px; }

/* BOARD */
.board-panel {
  background: var(--panel); border: 2px solid var(--border);
  padding: 12px; display: flex; flex-direction: column;
}
.board-header {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 8px; color: var(--text-dim); margin-bottom: 10px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.board-header span:first-child { color: var(--accent); font-size: 9px; }
.board-mode { background: var(--purple-dim); border: 1px solid var(--purple); color: var(--purple); padding: 2px 6px; font-size: 7px; }
.board-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; }
.harvest-grid { display: grid; gap: 3px; }
.corn-slot {
  background: var(--bg2); border: 1px solid var(--border);
  aspect-ratio: 1; position: relative; overflow: visible;
}
.corn-slot.chain-b { border-color: var(--accent); box-shadow: 0 0 8px rgba(245,200,66,0.5); }
.corn-slot.pop { animation: popIn 0.25s cubic-bezier(0.2,1.5,0.5,1) both; }
@keyframes popIn {
  0%{transform:scale(0.3) rotate(-10deg);opacity:0}
  60%{transform:scale(1.15) rotate(3deg)}
  100%{transform:scale(1) rotate(0deg);opacity:1}
}
.corn-sprite {
  width:100%; height:100%;
  background-image: url('corns.png');
  background-size: 800% 800%;
  image-rendering: pixelated;
}
.chain-badge {
  position: absolute; bottom: 1px; right: 1px;
  background: var(--accent); color: #000;
  font-size: 5px; padding: 1px 2px; z-index: 5; pointer-events: none;
}
.slot-tip {
  display: none; position: absolute; bottom: calc(100% + 5px); left: 50%;
  transform: translateX(-50%); background: #000; border: 1px solid var(--accent);
  color: var(--accent); font-size: 7px; padding: 3px 6px; white-space: nowrap;
  z-index: 100; pointer-events: none;
}
.corn-slot:hover .slot-tip { display: block; }
.earn-strip {
  margin-top: 10px; padding: 9px 14px;
  background: var(--bg2); border: 1px solid var(--border);
  text-align: center; min-height: 36px;
  display: flex; align-items: center; justify-content: center;
}
.earn-idle { font-size: 7px; color: var(--text-dim); }
.earn-val { font-size: 15px; color: var(--accent); animation: earnPop 0.3s ease; }
@keyframes earnPop { 0%{transform:scale(0.8)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

/* RIGHT COL */
.right-col { display: flex; flex-direction: column; gap: 8px; }
.panel-box { background: var(--panel); border: 2px solid var(--border); padding: 10px; }
.panel-box h3 {
  font-size: 8px; color: var(--text-dim);
  padding-bottom: 7px; border-bottom: 1px solid var(--border); margin-bottom: 8px;
}

/* HARVEST BUTTONS */
.hvbtn {
  width: 100%; display: flex; justify-content: space-between; align-items: center;
  padding: 9px 10px; background: var(--purple-dim); border: 2px solid var(--purple);
  color: #e0c0ff; font-family: 'Press Start 2P', monospace; font-size: 8px;
  cursor: pointer; margin-bottom: 5px; transition: all 0.1s;
}
.hvbtn:hover:not(:disabled) { background: #5e20a0; transform: translateY(-1px); }
.hvbtn:active:not(:disabled) { transform: translateY(1px); }
.hvbtn:disabled { opacity: 0.35; cursor: not-allowed; }
.hvbtn .cost { font-size: 7px; color: #c084fc; }

/* TABS */
.tab-bar { display: flex; gap: 2px; }
.tbtn {
  flex: 1; padding: 6px 2px;
  background: var(--bg2); border: 1px solid var(--border2);
  color: var(--text-dim); font-family: 'Press Start 2P', monospace;
  font-size: 6px; cursor: pointer; text-align: center; transition: all 0.15s;
}
.tbtn:hover { color: var(--text); }
.tbtn.active { background: var(--accent); color: #111; border-color: var(--accent); }
.tbtn.rebirth-tab { border-color: var(--orange-dim); }
.tbtn.rebirth-tab.active { background: var(--orange); border-color: var(--orange); color: #111; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* SCROLL */
.scroll { max-height: 300px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* UNLOCK ITEMS */
.unlock-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 6px; border: 1px solid var(--border);
  margin-bottom: 3px; background: var(--bg2); transition: all 0.1s;
}
.unlock-row.buyable { border-color: var(--green-dim); cursor: pointer; }
.unlock-row.buyable:hover { border-color: var(--green); background: #0a1a10; }
.unlock-row.owned { border-color: #1a2a1a; opacity: 0.5; }
.uspr {
  width: 34px; height: 34px;
  background-image: url('corns.png'); background-size: 800% 800%;
  image-rendering: pixelated; border: 1px solid var(--border2); flex-shrink: 0;
}
.uinfo { flex: 1; min-width: 0; }
.uname { font-size: 7px; margin-bottom: 3px; }
.ucost { font-size: 6px; }
.ucost.can { color: var(--green); }
.ucost.cant { color: var(--text-dim); }
.ucost.done { color: #4a7a4a; }

/* UPGRADE SECTIONS */
.upg-section { margin-bottom: 10px; }
.upg-section-title {
  font-size: 7px; color: var(--text-mid);
  padding: 4px 6px; background: var(--bg);
  border-left: 3px solid var(--accent-dim);
  margin-bottom: 4px;
}
.upg-row {
  padding: 8px; border: 1px solid var(--border);
  margin-bottom: 3px; background: var(--bg2); transition: all 0.1s;
}
.upg-row.buyable { border-color: #1a3a1a; cursor: pointer; }
.upg-row.buyable:hover { border-color: var(--green); background: #0a1a10; }
.upg-row.owned { border-color: #1a2000; background: #101400; }
.upg-row.locked { opacity: 0.35; }
.upg-name { font-size: 8px; color: var(--accent); margin-bottom: 4px; }
.upg-row.owned .upg-name { color: var(--accent-dim); }
.upg-desc { font-size: 6px; color: var(--text-dim); margin-bottom: 4px; line-height: 1.7; }
.upg-cost { font-size: 7px; }

/* SKILL TREE */
.sk-sp-bar {
  background: var(--bg2); border: 1px solid var(--border);
  padding: 6px 8px; margin-bottom: 6px;
  display: flex; justify-content: space-between; align-items: center; font-size: 7px;
}
.sk-section { margin-bottom: 8px; }
.sk-section-title {
  font-size: 6px; color: var(--text-dim);
  padding: 4px 0; margin-bottom: 4px;
  border-bottom: 1px dashed var(--border2);
}
.skill-node {
  padding: 8px; border: 1px solid var(--border);
  margin-bottom: 3px; background: var(--bg2);
  position: relative; transition: all 0.12s;
}
.skill-node.avail { border-color: #1a2a40; cursor: pointer; }
.skill-node.avail:hover { border-color: var(--purple); background: #0f0f20; }
.skill-node.owned { border-color: var(--accent-dim); background: #121000; }
.skill-node.blocked { opacity: 0.3; }
.sk-name { font-size: 8px; color: var(--purple); margin-bottom: 3px; }
.skill-node.owned .sk-name { color: var(--accent); }
.sk-desc { font-size: 6px; color: var(--text-dim); line-height: 1.7; }
.sk-req { font-size: 5px; color: var(--text-dim); margin-top: 3px; }
.sk-cost { position: absolute; top: 6px; right: 6px; font-size: 6px; color: var(--purple); background: var(--bg); padding: 1px 4px; }

/* REBIRTH */
.rebirth-panel { padding: 10px; }
.rebirth-info {
  background: var(--bg2); border: 1px solid var(--orange-dim);
  padding: 10px; margin-bottom: 8px;
}
.rebirth-info .rb-title { font-size: 8px; color: var(--orange); margin-bottom: 6px; }
.rebirth-info .rb-line { font-size: 7px; color: var(--text-dim); margin-bottom: 4px; line-height: 1.8; }
.rebirth-info .rb-line span { color: var(--text); }
.rebirth-cond {
  padding: 8px; border: 1px solid var(--border);
  background: var(--bg); margin-bottom: 8px; font-size: 7px;
}
.rebirth-cond.met { border-color: var(--green); color: var(--green); }
.rebirth-cond.unmet { border-color: var(--red-dim); color: var(--text-dim); }
.rebirth-btn {
  width: 100%; padding: 12px; font-family: 'Press Start 2P', monospace;
  font-size: 10px; cursor: pointer; border: 3px solid;
  transition: all 0.1s; margin-bottom: 10px;
}
.rebirth-btn.ready {
  background: #3a0a0a; border-color: var(--red); color: var(--red);
  animation: rebPulse 2s ease-in-out infinite;
}
.rebirth-btn.ready:hover { background: #5a1010; transform: scale(1.02); }
@keyframes rebPulse {
  0%,100%{box-shadow: 0 0 10px rgba(239,68,68,0.3)}
  50%{box-shadow: 0 0 20px rgba(239,68,68,0.7)}
}
.rebirth-btn:disabled { background: var(--bg2); border-color: var(--border); color: var(--text-dim); cursor: not-allowed; }
.rp-section-title {
  font-size: 7px; color: var(--orange); margin-bottom: 6px;
  padding-bottom: 4px; border-bottom: 1px solid var(--orange-dim);
}
.rp-row {
  padding: 8px; border: 1px solid var(--border);
  margin-bottom: 3px; background: var(--bg2); transition: all 0.1s;
}
.rp-row.buyable { border-color: var(--orange-dim); cursor: pointer; }
.rp-row.buyable:hover { border-color: var(--orange); background: #1a0e00; }
.rp-row.owned { border-color: #2a1a00; background: #151000; }
.rp-row.locked { opacity: 0.35; }
.rp-name { font-size: 8px; color: var(--orange); margin-bottom: 4px; }
.rp-row.owned .rp-name { color: var(--orange-dim); }
.rp-desc { font-size: 6px; color: var(--text-dim); margin-bottom: 4px; line-height: 1.7; }
.rp-cost { font-size: 7px; }
.rp-cost.can { color: var(--orange); }
.rp-cost.cant { color: var(--text-dim); }
.rp-cost.done { color: var(--orange-dim); }

/* FLOAT / TOAST */
.float-g {
  position: fixed; pointer-events: none;
  font-family: 'Press Start 2P', monospace; font-size: 13px;
  color: var(--accent); text-shadow: 0 0 12px rgba(245,200,66,0.8);
  z-index: 9999; animation: flyUp 1.4s ease-out forwards;
}
@keyframes flyUp {
  0%{opacity:1;transform:translateY(0) scale(1)}
  30%{opacity:1;transform:translateY(-15px) scale(1.1)}
  100%{opacity:0;transform:translateY(-55px) scale(0.7)}
}
.toast {
  position: fixed; top: 16px; right: 16px;
  background: var(--panel); border: 2px solid var(--accent);
  padding: 10px 16px; font-size: 8px; color: var(--accent);
  z-index: 9998;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
  max-width: 260px; line-height: 1.6;
}
.toast.rp-toast { border-color: var(--orange); color: var(--orange); }
@keyframes toastIn { from{transform:translateX(110%)} to{transform:translateX(0)} }
@keyframes toastOut { from{transform:translateX(0);opacity:1} to{transform:translateX(110%);opacity:0} }

/* OFFLINE MODAL */
.modal-back {
  position: fixed; inset: 0; background: rgba(0,0,0,0.88);
  display: flex; align-items: center; justify-content: center; z-index: 9997;
}
.modal-box { background: var(--panel); border: 3px solid var(--accent); padding: 28px 32px; text-align: center; max-width: 380px; }
.modal-box h2 { font-size: 11px; color: var(--accent); margin-bottom: 18px; }
.modal-box p { font-size: 8px; color: var(--text-dim); line-height: 2.2; margin-bottom: 20px; }
.modal-box p strong { color: var(--purple); }
.modal-ok { background: var(--accent); border: 2px solid #c9a000; color: #000; font-family: 'Press Start 2P', monospace; font-size: 9px; padding: 10px 24px; cursor: pointer; }
.modal-ok:hover { background: #ffd700; }
</style>
</head>
<body>
<div class="wrap">

  <div class="title-bar">
    <h1>🌽 ㅇ-ㅇ Get CORNed ㅇ-ㅇ 🌽</h1>
    <span class="save-ind" id="saveInd">● 자동저장</span>
  </div>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-box">
      <div class="hud-label">💰 보유 G</div>
      <div class="hud-val money" id="moneyDisp">0 G</div>
      <div class="hud-sub">총: <span id="totalMoneyDisp">0</span> G</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">🔮 간디력</div>
      <div class="gandhi-row">
        <span class="gandhi-cnt" id="gandhiDisp">0 / 200</span>
        <span class="gandhi-tmr" id="timerDisp">10.0초</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="gandhiBar" style="width:0%"></div></div>
      <div class="hud-sub">누적 사용: <span id="totalGDisp">0</span></div>
    </div>
    <div class="hud-box">
      <div class="hud-label">⚡ 스킬 포인트</div>
      <div class="hud-val sp" id="spDisp">0 SP</div>
      <div class="hud-sub">사용가능: <span id="freeSPDisp">0</span></div>
    </div>
    <div class="hud-box">
      <div class="hud-label">🔁 환생 포인트</div>
      <div class="hud-val rp" id="rpDisp">0 RP</div>
      <div class="hud-sub">환생: <span id="rebirthCntDisp">0</span>회</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-layout">
    <div class="board-panel">
      <div class="board-header">
        <span>🌽 수확 보드</span>
        <span class="board-mode" id="boardBadge">1×1</span>
      </div>
      <div class="board-area">
        <div id="harvestGrid" class="harvest-grid"></div>
      </div>
      <div class="earn-strip" id="earnStrip">
        <span class="earn-idle">수확 버튼으로 옥수수를 뽑으세요</span>
      </div>
    </div>

    <div class="right-col">
      <!-- HARVEST -->
      <div class="panel-box">
        <h3>🎯 수확하기</h3>
        <button class="hvbtn" id="hv1" onclick="harvest(1,1)">
          <span>1×1 수확</span><span class="cost">간디력 -1</span>
        </button>
        <button class="hvbtn" id="hv2" onclick="harvest(2,5)" style="display:none">
          <span>2×2 수확</span><span class="cost">간디력 -5</span>
        </button>
        <button class="hvbtn" id="hv4" onclick="harvest(4,20)" style="display:none">
          <span>4×4 수확</span><span class="cost">간디력 -20</span>
        </button>
        <button class="hvbtn" id="hv8" onclick="harvest(8,100)" style="display:none">
          <span>8×8 수확</span><span class="cost">간디력 -100</span>
        </button>
      </div>

      <!-- TABS -->
      <div class="tab-bar">
        <button class="tbtn active"       onclick="switchTab('unlock',this)">해금</button>
        <button class="tbtn"              onclick="switchTab('upgrade',this)">업그레이드</button>
        <button class="tbtn"              onclick="switchTab('skill',this)">스킬</button>
        <button class="tbtn rebirth-tab"  onclick="switchTab('rebirth',this)">환생</button>
      </div>

      <div class="panel-box" style="padding:8px">
        <!-- UNLOCK -->
        <div id="tab-unlock" class="tab-pane active">
          <div class="scroll" id="unlockList"></div>
        </div>
        <!-- UPGRADE -->
        <div id="tab-upgrade" class="tab-pane">
          <div class="scroll" id="upgradeList"></div>
        </div>
        <!-- SKILL -->
        <div id="tab-skill" class="tab-pane">
          <div class="sk-sp-bar">
            <span>가용 SP</span>
            <span style="color:var(--purple)" id="freeSPDisp2">0</span>
          </div>
          <div class="scroll" id="skillList"></div>
        </div>
        <!-- REBIRTH -->
        <div id="tab-rebirth" class="tab-pane">
          <div class="scroll">
            <div class="rebirth-panel" id="rebirthPanel"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- OFFLINE MODAL -->
<div class="modal-back" id="offModal" style="display:none">
  <div class="modal-box">
    <h2>🕐 오프라인 귀환!</h2>
    <p id="offMsg"></p>
    <button class="modal-ok" onclick="document.getElementById('offModal').style.display='none'">수령하기</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const CORNS = [
  {name:"기본 옥수수",v:10,u:0},{name:"불꽃 옥수수",v:18,u:200},{name:"얼음 옥수수",v:30,u:500},
  {name:"번개 옥수수",v:45,u:1000},{name:"독성 옥수수",v:70,u:2000},{name:"바람 옥수수",v:100,u:5000},
  {name:"대지 옥수수",v:125,u:7500},{name:"빛의 옥수수",v:150,u:10000},{name:"어둠 옥수수",v:200,u:15000},
  {name:"황금 옥수수",v:300,u:50000},{name:"은빛 옥수수",v:400,u:100000},{name:"수정 옥수수",v:500,u:150000},

// UTIL

function fmtG(n) {
  n = Number(n);
  if (n >= 1e18) return (n/1e18).toFixed(2)+'Qi';
  if (n >= 1e15) return (n/1e15).toFixed(2)+'Q';
  if (n >= 1e12) return (n/1e12).toFixed(2)+'T';
  if (n >= 1e9)  return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6)  return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3)  return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toString();
}
function fmtTime(s) {
  if (s < 60)   return s+'초';
  if (s < 3600) return Math.floor(s/60)+'분 '+Math.floor(s%60)+'초';
  return Math.floor(s/3600)+'시간 '+Math.floor((s%3600)/60)+'분';
}
function sprStyle(idx) {
  const c = idx%8, r = Math.floor(idx/8);
  return `background-position:${c/7*100}% ${r/7*100}%`;
}
// nth rebirth requires corn index: 2n+2  (1st→4, 2nd→6, ...)
function rebirthRequiredIdx(n) { return 2*n + 2; }

function save() {
  S.lastSave = Date.now();
  localStorage.setItem('cornGandi2', JSON.stringify(S));
  const el = document.getElementById('saveInd');
  el.classList.add('flash');
  setTimeout(()=>el.classList.remove('flash'), 500);
}
function load() {
  const raw = localStorage.getItem('cornGandi2');
  if (!raw) return;
  const ld = JSON.parse(raw);
  Object.assign(S, ld);
  // Offline calc
  const now = Date.now();
  const interval = S.gandhiInterval || 10;
  const elapsed = Math.floor((now - S.lastSave) / (interval * 1000));
  if (elapsed > 0) {
    const gained = Math.min(elapsed, S.gandhiMax);
    S.gandhi = Math.min(S.gandhi + gained, S.gandhiMax);
    const msg = document.getElementById('offMsg');
    msg.innerHTML = `오프라인 시간: <strong>${fmtTime(elapsed*interval)}</strong><br>간디력 <strong>+${gained}</strong> 획득!`;
    document.getElementById('offModal').style.display = 'flex';
  }
  S.lastSave = now;
}

// ═══════════════════════════════════════
// RECALC
// ═══════════════════════════════════════
function recalc() {
  let mult=1, floor=0, bias=0;
  // Process upgrades in order (lower tiers stack properly)
  const multIds  = ['m1','m2','m3','m4','m5','m6'];
  const floorMap = {f1:1, f2:2, f3:4, f4:6};
  const biasMap  = {b1:1, b2:2, b3:3, b4:4};
  for (const id of multIds)      { if (S.upg[id]) { const u=UPGRADES_FLAT.find(x=>x.id===id); mult*=parseInt(u.desc.replace(/[^0-9]/g,'')); } }
  for (const [id,v] of Object.entries(floorMap)) { if (S.upg[id]) floor = Math.max(floor, v); }
  for (const [id,v] of Object.entries(biasMap))  { if (S.upg[id]) bias  = Math.max(bias,  v); }
  // Actually recalc mult properly
  mult = 1;
  if (S.upg['m1']) mult *= 2;
  if (S.upg['m2']) mult *= 3;
  if (S.upg['m3']) mult *= 5;
  if (S.upg['m4']) mult *= 10;
  if (S.upg['m5']) mult *= 20;
  if (S.upg['m6']) mult *= 50;
  S.mult  = mult * (S.rpMult || 1);
  S.floor = floor;
  S.bias  = bias;
  S.chain  = !!S.skills['ch1'];
  S.chain2 = !!S.skills['ch2'];
  if (S.skills['h2']) document.getElementById('hv2').style.display = '';
  if (S.skills['h4']) document.getElementById('hv4').style.display = '';
  if (S.skills['h8']) document.getElementById('hv8').style.display = '';
}
function recalcRP() {
  let interval = 10;
  if (S.rpUpg['ri1']) interval = 5;
  if (S.rpUpg['ri2']) interval = 3;
  if (S.rpUpg['ri3']) interval = 2;
  if (S.rpUpg['ri4']) interval = 1;
  S.gandhiInterval = interval;
  S.rpMult = Math.pow(2, S.rpMultLevel || 0);
}

function totalSP() { return Math.floor(S.totalGUsed / 100); }
function usedSP()  { return SKILLS_DEF.filter(sk=>S.skills[sk.id]).reduce((a,b)=>a+b.cost,0); }
function freeSP()  { return totalSP() - usedSP(); }

// ═══════════════════════════════════════
// DRAW
// ═══════════════════════════════════════
function drawOne() {
  const pool = S.unlocked, n = pool.length;
  const off  = Math.min(S.floor, n-1);
  const w = [];
  for (let i=off; i<n; i++) {
    const t = (n-off<=1) ? 1 : (i-off)/(n-off-1);
    const wt = Math.max(1, Math.pow(1+t, S.bias*2));
    for (let j=0; j<Math.round(wt*10); j++) w.push(pool[i]);
  }
  return w[Math.floor(Math.random()*w.length)];
}

// ═══════════════════════════════════════
// CHAIN
// ═══════════════════════════════════════
function calcChains(board, cols) {
  const n=board.length, rows=n/cols;
  const bonuses=new Array(n).fill(1);
  if (!S.chain || n<=1) return bonuses;
  const vis=new Array(n).fill(false);
  function adj(i) {
    const r=Math.floor(i/cols),c=i%cols,res=[];
    if(r>0)res.push(i-cols); if(r<rows-1)res.push(i+cols);
    if(c>0)res.push(i-1);   if(c<cols-1) res.push(i+1);
    return res;
  }
  for(let i=0;i<n;i++){
    if(vis[i])continue;
    const comp=[i]; vis[i]=true;
    for(let qi=0;qi<comp.length;qi++){
      for(const nb of adj(comp[qi])){
        if(!vis[nb]&&board[nb]===board[comp[qi]]){vis[nb]=true;comp.push(nb);}
      }
    }
    const b=S.chain2?comp.length*1.5:comp.length;
    for(const idx of comp) bonuses[idx]=b;
  }
  return bonuses;
}

// ═══════════════════════════════════════
// HARVEST
// ═══════════════════════════════════════
function harvest(dim, cost) {
  if (S.gandhi < cost) { toast('간디력이 부족합니다!'); return; }
  S.gandhi    -= cost;
  S.totalGUsed += cost;
  const size  = dim*dim;
  const board = Array.from({length:size}, drawOne);
  S.board     = board;
  const bon   = calcChains(board, dim);
  let total   = 0;
  for (let i=0;i<size;i++) total += CORNS[board[i]].v * S.mult * bon[i];
  total = Math.floor(total);
  S.money      += total;
  S.totalMoney += total;
  renderBoard(board, dim, bon);
  document.getElementById('earnStrip').innerHTML = `<span class="earn-val">+${fmtG(total)} G</span>`;
  const hv = document.getElementById('hv1');
  const rc = hv.getBoundingClientRect();
  floatTxt(`+${fmtG(total)}G`, rc.left+rc.width/2, rc.top);
  updateHUD(); renderUnlocks(); renderUpgrades(); renderSkills(); renderRebirth();
  save();
}

// ═══════════════════════════════════════
// UNLOCKS (역순)
// ═══════════════════════════════════════
function renderUnlocks() {
  const list = document.getElementById('unlockList');
  list.innerHTML = '';
  // Build display order: next-to-unlock first, then owned in reverse
  const items = [];
  for (let i=0; i<CORNS.length; i++) {
    const owned  = S.unlocked.includes(i);
    const isNext = !owned && (i===0 || S.unlocked.includes(i-1));
    if (!owned && !isNext) continue;
    items.push({i, owned, isNext});
  }
  // Sort: next first, then owned descending
  items.sort((a,b) => {
    if (a.isNext && !b.isNext) return -1;
    if (!a.isNext && b.isNext) return 1;
    return b.i - a.i; // owned: higher index first
  });
  for (const {i, owned, isNext} of items) {
    const canBuy = isNext && S.money >= CORNS[i].u;
    const row = document.createElement('div');
    row.className = 'unlock-row '+(owned?'owned':(canBuy?'buyable':''));
    const spr = document.createElement('div');
    spr.className = 'uspr'; spr.setAttribute('style', sprStyle(i));
    row.appendChild(spr);
    const info = document.createElement('div');
    info.className = 'uinfo';
    info.innerHTML = `<div class="uname">${CORNS[i].name}</div>
      <div class="ucost ${owned?'done':(S.money>=CORNS[i].u&&isNext?'can':'cant')}">
        ${owned?'✓ 해금 | 가치: '+fmtG(CORNS[i].v)+'G':'해금: '+fmtG(CORNS[i].u)+' G'}
      </div>`;
    row.appendChild(info);
    if (canBuy) row.addEventListener('click', ()=>buyCorn(i));
    list.appendChild(row);
  }
}
function buyCorn(i) {
  if (S.unlocked.includes(i)||S.money<CORNS[i].u) return;
  S.money -= CORNS[i].u;
  S.unlocked.push(i); S.unlocked.sort((a,b)=>a-b);
  toast('🌽 '+CORNS[i].name+' 해금!');
  updateHUD(); renderUnlocks(); renderRebirth(); save();
}

// ═══════════════════════════════════════
// UPGRADES (역순 within each group)
// ═══════════════════════════════════════
function renderUpgrades() {
  const list = document.getElementById('upgradeList');
  list.innerHTML = '';
  for (const grp of UPG_GROUPS) {
    const sec = document.createElement('div');
    sec.className = 'upg-section';
    const hdr = document.createElement('div');
    hdr.className = 'upg-section-title'; hdr.textContent = grp.title;
    sec.appendChild(hdr);
    // items already stored in reverse (high → low)
    for (const u of grp.items) {
      const owned  = !!S.upg[u.id];
      const reqMet = !u.req || S.upg[u.req];
      const canBuy = !owned && reqMet && S.money >= u.cost;
      const row = document.createElement('div');
      row.className = 'upg-row '+(owned?'owned':(canBuy?'buyable':(!reqMet?'locked':'')));
      row.innerHTML = `<div class="upg-name">${owned?'✓ ':''} ${u.name}</div>
        <div class="upg-desc">${u.desc}</div>
        <div class="upg-cost" style="color:${owned?'var(--accent-dim)':(canBuy?'var(--green)':(!reqMet?'var(--text-dim)':'#664'))}">
          ${owned?'구매 완료':(reqMet?fmtG(u.cost)+' G':'🔒 이전 단계 필요')}
        </div>`;
      if (canBuy) row.addEventListener('click', ()=>buyUpg(u.id));
      sec.appendChild(row);
    }
    list.appendChild(sec);
  }
}
function buyUpg(id) {
  const u = UPGRADES_FLAT.find(x=>x.id===id);
  if (!u||S.upg[id]||S.money<u.cost) return;
  if (u.req&&!S.upg[u.req]) return;
  S.money -= u.cost; S.upg[id] = true;
  recalc();
  toast('⬆ '+u.name+' 구매!');
  updateHUD(); renderUpgrades(); save();
}

// ═══════════════════════════════════════
// SKILLS (역순 within groups)
// ═══════════════════════════════════════
function renderSkills() {
  const list = document.getElementById('skillList');
  list.innerHTML = '';
  const groups = [...new Set(SKILLS_DEF.map(s=>s.grp))];
  for (const grp of groups) {
    const sec = document.createElement('div'); sec.className='sk-section';
    const hdr = document.createElement('div'); hdr.className='sk-section-title'; hdr.textContent=grp;
    sec.appendChild(hdr);
    // Reverse within group: higher cost (later) first
    const gItems = [...SKILLS_DEF.filter(s=>s.grp===grp)].reverse();
    for (const sk of gItems) {
      const owned  = !!S.skills[sk.id];
      const reqMet = sk.req.every(r=>S.skills[r]);
      const canBuy = !owned && reqMet && freeSP()>=sk.cost;
      const node = document.createElement('div');
      node.className='skill-node '+(owned?'owned':(canBuy?'avail':'blocked'));
      node.innerHTML=`<span class="sk-cost">${owned?'✓':sk.cost+' SP'}</span>
        <div class="sk-name">${sk.name}</div>
        <div class="sk-desc">${sk.desc}</div>
        ${sk.req.length?`<div class="sk-req">필요: ${sk.req.map(r=>SKILLS_DEF.find(s=>s.id===r)?.name).join(', ')}</div>`:''}`;
      if (canBuy) node.addEventListener('click',()=>buySkill(sk.id));
      sec.appendChild(node);
    }
    list.appendChild(sec);
  }
  if (document.getElementById('freeSPDisp2'))
    document.getElementById('freeSPDisp2').textContent = freeSP();
}
function buySkill(id) {
  const sk=SKILLS_DEF.find(s=>s.id===id);
  if(!sk||S.skills[id]||freeSP()<sk.cost) return;
  if(!sk.req.every(r=>S.skills[r])) return;
  S.skills[id]=true;
  if(id==='gm1')S.gandhiMax+=100;
  if(id==='gm2')S.gandhiMax+=200;
  if(id==='gm3')S.gandhiMax+=500;
  if(id==='gm4')S.gandhiMax+=2000;
  if(id==='h2')document.getElementById('hv2').style.display='';
  if(id==='h4')document.getElementById('hv4').style.display='';
  if(id==='h8')document.getElementById('hv8').style.display='';
  recalc();
  toast('⚡ '+sk.name+' 해금!');
  updateHUD(); renderSkills(); save();
}

// ═══════════════════════════════════════
// REBIRTH
// ═══════════════════════════════════════
function getRebirthReq() {
  const n = S.rebirths + 1;
  return rebirthRequiredIdx(n); // 0-based index
}
function canRebirth() {
  const req = getRebirthReq();
  return req < CORNS.length && S.unlocked.includes(req);
}
function renderRebirth() {
  const panel = document.getElementById('rebirthPanel');
  if (!panel) return;
  const nextN = S.rebirths + 1;
  const reqIdx = getRebirthReq();
  const reqCorn = reqIdx < CORNS.length ? CORNS[reqIdx] : null;
  const met = canRebirth();
  const rpEarn = nextN; // nth rebirth gives n RP

  let html = `
  <div class="rebirth-info">
    <div class="rb-title">🔁 환생 시스템</div>
    <div class="rb-line">환생 횟수: <span>${S.rebirths}회</span></div>
    <div class="rb-line">보유 RP: <span style="color:var(--orange)">${S.rp} RP</span></div>
    <div class="rb-line">이번 환생 보상: <span style="color:var(--orange)">+${rpEarn} RP</span></div>
  </div>
  <div class="rebirth-cond ${met?'met':'unmet'}">
    ${reqCorn
      ? `${met?'✅':'🔒'} 조건: ${reqCorn.name} 해금 (${nextN}번째 환생, 2×${nextN}+3=${reqIdx+1}번째 옥수수)`
      : '모든 옥수수 해금 완료!'}
  </div>
  <button class="rebirth-btn ${met?'ready':''}" ${met?'':'disabled'} onclick="doRebirth()">
    🔁 환생하기
  </button>
  <div class="rp-section-title">⚡ 환생 업그레이드</div>`;

  // Interval upgrades (역순)
  html += `<div style="font-size:6px;color:var(--text-dim);margin-bottom:5px;">🕐 간디력 획득 주기</div>`;
  const riReversed = [...RP_INTERVAL].reverse();
  for (const u of riReversed) {
    const owned  = !!S.rpUpg[u.id];
    const reqMet = !u.req || S.rpUpg[u.req];
    const canBuy = !owned && reqMet && S.rp >= u.cost;
    html += `<div class="rp-row ${owned?'owned':(canBuy?'buyable':(!reqMet?'locked':''))}"
      ${canBuy?`onclick="buyRPUpg('${u.id}')" style="cursor:pointer"`:''}>
      <div class="rp-name">${owned?'✓ ':' '}${u.name}</div>
      <div class="rp-desc">${u.desc}</div>
      <div class="rp-cost ${owned?'done':(canBuy?'can':'cant')}">
        ${owned?'적용 중':(reqMet?u.cost+' RP 필요':'🔒 이전 단계 필요')}
      </div>
    </div>`;
  }

  // Money mult upgrades (infinite, 역순으로 최근 것 상단)
  html += `<div style="font-size:6px;color:var(--text-dim);margin:8px 0 5px;">💰 돈 획득 배율 (현재 ×${S.rpMult})</div>`;
  const nextMultLevel = (S.rpMultLevel || 0) + 1;
  const nextMult = Math.pow(2, nextMultLevel);
  html += `<div class="rp-row ${S.rp>=1?'buyable':''}"
    ${S.rp>=1?`onclick="buyRPMult()" style="cursor:pointer"`:''}>
    <div class="rp-name">배율 강화 Lv.${nextMultLevel}</div>
    <div class="rp-desc">G 획득 배율: ×${Math.pow(2,S.rpMultLevel||0)} → ×${nextMult}</div>
    <div class="rp-cost ${S.rp>=1?'can':'cant'}">1 RP 필요</div>
  </div>`;

  panel.innerHTML = html;
}

function doRebirth() {
  if (!canRebirth()) return;
  if (!confirm(`환생하시겠습니까?\n\n초기화: G, 간디력, 업그레이드, 옥수수 해금\n유지: 스킬포인트, 누적 간디력 사용량\n보상: +${S.rebirths+1} RP`)) return;

  S.rebirths += 1;
  S.rp += S.rebirths; // nth rebirth gives n RP

  // Reset
  S.gandhi    = 0;
  S.gandhiMax = 200;
  S.money     = 0;
  S.totalMoney = 0;
  S.unlocked  = [0];
  S.upg       = {};
  S.board     = [];
  S.mult      = 1;
  S.floor     = 0;
  S.bias      = 0;
  S.chain     = false;
  S.chain2    = false;
  // Keep: totalGUsed, skills, rp, rpUpg, rpMultLevel
  // Restore harvest buttons hidden
  document.getElementById('hv2').style.display = 'none';
  document.getElementById('hv4').style.display = 'none';
  document.getElementById('hv8').style.display = 'none';
  // Re-apply skill-based harvest buttons
  recalcRP(); recalc();

  // Clear board
  document.getElementById('harvestGrid').innerHTML = '';
  document.getElementById('earnStrip').innerHTML = '<span class="earn-idle">새 여정이 시작됩니다...</span>';
  document.getElementById('boardBadge').textContent = '1×1';

  toast('🔁 환생! +'+S.rebirths+' RP 획득!', true);
  updateHUD(); renderUnlocks(); renderUpgrades(); renderSkills(); renderRebirth();
  save();
}

function buyRPUpg(id) {
  const u = RP_INTERVAL.find(x=>x.id===id);
  if (!u||S.rpUpg[id]||S.rp<u.cost) return;
  if (u.req&&!S.rpUpg[u.req]) return;
  S.rp -= u.cost; S.rpUpg[id] = true;
  recalcRP(); recalc();
  toast('⚡ '+u.name+' 적용!', true);
  updateHUD(); renderRebirth(); save();
}
function buyRPMult() {
  if (S.rp < 1) return;
  S.rp -= 1;
  S.rpMultLevel = (S.rpMultLevel||0) + 1;
  recalcRP(); recalc();
  toast('💰 배율 강화 Lv.'+S.rpMultLevel+'! (×'+S.rpMult+')', true);
  updateHUD(); renderRebirth(); save();
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function switchTab(id, btn) {
  document.querySelectorAll('.tab-pane').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tbtn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='upgrade') renderUpgrades();
  if(id==='skill')   renderSkills();
  if(id==='rebirth') renderRebirth();
}

// ═══════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════
function toast(msg, isRp=false) {
  document.querySelectorAll('.toast').forEach(el=>el.remove());
  const el=document.createElement('div');
  el.className='toast'+(isRp?' rp-toast':'');
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}
function floatTxt(txt,x,y) {
  const el=document.createElement('div');
  el.className='float-g'; el.textContent=txt;
  el.style.left=(x-30)+'px'; el.style.top=(y-10)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1400);
}

// ═══════════════════════════════════════
// TICK
// ═══════════════════════════════════════
let lastTick=Date.now(), tickAccum=0;

function tick() {
  const now=Date.now(), dt=(now-lastTick)/1000;
  lastTick=now; tickAccum+=dt;
  const iv = S.gandhiInterval || 10;
  if (tickAccum >= iv) {
    const ticks=Math.floor(tickAccum/iv);
    tickAccum -= ticks*iv;
    S.gandhi = Math.min(S.gandhi+ticks, S.gandhiMax);
    save();
  }
  const cd = Math.max(0, iv - tickAccum);
  document.getElementById('timerDisp').textContent =
    S.gandhi>=S.gandhiMax ? '꽉 참!' : `${cd.toFixed(1)}초`;
  updateHUD();
  requestAnimationFrame(tick);
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function init() {
  load();
  recalcRP(); recalc();
  // Initial board placeholder
  const grid = document.getElementById('harvestGrid');
  grid.style.gridTemplateColumns = 'repeat(1,72px)';
  const slot=document.createElement('div');
  slot.className='corn-slot'; slot.style.cssText='width:72px;height:72px;opacity:0.12';
  const spr=document.createElement('div'); spr.className='corn-sprite';
  spr.setAttribute('style', sprStyle(0)); slot.appendChild(spr); grid.appendChild(slot);
  updateHUD(); renderUnlocks(); renderUpgrades(); renderSkills(); renderRebirth();
  lastTick=Date.now();
  requestAnimationFrame(tick);
}
init();
</script>
</body>
</html>
