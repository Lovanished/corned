<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌽 옥수수 간디력</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --bg2: #0e0e1c;
  --panel: #111120;
  --panel2: #16162a;
  --border: #252540;
  --border2: #3a3a60;
  --accent: #f5c842;
  --accent-dim: #8a700a;
  --green: #3ddc84;
  --green-dim: #1a5a38;
  --purple: #a855f7;
  --purple-dim: #4a1070;
  --red: #ef4444;
  --text: #dde0f0;
  --text-dim: #5a5a80;
  --text-mid: #9090b0;
  --chain-glow: #f5c842;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 0%, rgba(168,85,247,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 50% 30% at 80% 100%, rgba(61,220,132,0.04) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.012) 3px, rgba(255,255,255,0.012) 4px);
}

/* ─── LAYOUT ─── */
.wrap { max-width: 1100px; margin: 0 auto; padding: 8px; }

/* ─── TITLE BAR ─── */
.title-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--panel);
  border: 2px solid var(--border2);
  margin-bottom: 8px;
}
.title-bar h1 {
  font-size: 13px;
  color: var(--accent);
  text-shadow: 0 0 16px rgba(245,200,66,0.5);
  letter-spacing: 1px;
}
.save-indicator {
  font-size: 7px;
  color: var(--text-dim);
}
.save-indicator.flash { color: var(--green); }

/* ─── HUD ─── */
.hud {
  display: grid;
  grid-template-columns: 1.4fr 1.6fr 1fr;
  gap: 6px;
  margin-bottom: 8px;
}
.hud-box {
  background: var(--panel);
  border: 2px solid var(--border);
  padding: 10px 12px;
}
.hud-label { font-size: 7px; color: var(--text-dim); margin-bottom: 5px; }
.hud-value { font-size: 13px; }
.hud-value.money { color: var(--accent); }
.hud-value.sp { color: var(--purple); }

.gandhi-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 5px;
}
.gandhi-count { font-size: 11px; color: var(--purple); }
.gandhi-timer { font-size: 7px; color: var(--text-dim); }
.bar-track {
  height: 7px;
  background: var(--bg);
  border: 1px solid var(--border2);
  position: relative;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #7c3aed, #a855f7, #c084fc);
  transition: width 0.4s;
}
.bar-fill::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 4px;
  background: white;
  opacity: 0.7;
  animation: blip 1.2s ease-in-out infinite;
}
@keyframes blip { 0%,100%{opacity:0.2} 50%{opacity:0.9} }

.hud-sub { font-size: 6px; color: var(--text-dim); margin-top: 4px; }

/* ─── MAIN ─── */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 290px;
  gap: 8px;
}

/* ─── BOARD ─── */
.board-panel {
  background: var(--panel);
  border: 2px solid var(--border);
  padding: 12px;
  display: flex;
  flex-direction: column;
}
.board-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 8px;
  color: var(--text-dim);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.board-header span:first-child { color: var(--accent); font-size: 9px; }
.board-mode-badge {
  background: var(--purple-dim);
  border: 1px solid var(--purple);
  color: var(--purple);
  padding: 2px 6px;
  font-size: 7px;
}

.board-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 200px;
}

.harvest-grid {
  display: grid;
  gap: 3px;
}

.corn-slot {
  background: var(--bg2);
  border: 1px solid var(--border);
  aspect-ratio: 1;
  position: relative;
  overflow: visible;
  cursor: default;
  transition: border-color 0.15s;
}
.corn-slot.chain-bonus {
  border-color: var(--chain-glow);
  box-shadow: 0 0 8px rgba(245,200,66,0.5);
}
.corn-slot.pop {
  animation: popIn 0.25s cubic-bezier(0.2, 1.5, 0.5, 1) both;
}
@keyframes popIn {
  0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
  60% { transform: scale(1.15) rotate(3deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.corn-sprite {
  width: 100%;
  height: 100%;
  background-image: url('corns.png');
  background-size: 800% 800%;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

.chain-badge {
  position: absolute;
  bottom: 1px;
  right: 1px;
  background: var(--accent);
  color: #000;
  font-size: 5px;
  padding: 1px 2px;
  z-index: 5;
  line-height: 1;
  pointer-events: none;
}

.slot-tip {
  display: none;
  position: absolute;
  bottom: calc(100% + 5px);
  left: 50%;
  transform: translateX(-50%);
  background: #000;
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 7px;
  padding: 3px 6px;
  white-space: nowrap;
  z-index: 100;
  pointer-events: none;
}
.corn-slot:hover .slot-tip { display: block; }

.earnings-strip {
  margin-top: 10px;
  padding: 9px 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  text-align: center;
  min-height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.earn-idle { font-size: 7px; color: var(--text-dim); }
.earn-value { font-size: 15px; color: var(--accent); animation: earnPop 0.3s ease; }
@keyframes earnPop { 0%{transform:scale(0.8)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

/* ─── RIGHT PANEL ─── */
.right-col { display: flex; flex-direction: column; gap: 8px; }

.panel-box {
  background: var(--panel);
  border: 2px solid var(--border);
  padding: 10px;
}
.panel-box h3 {
  font-size: 8px;
  color: var(--text-dim);
  padding-bottom: 7px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}

/* ─── HARVEST BUTTONS ─── */
.hvbtn {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 10px;
  background: var(--purple-dim);
  border: 2px solid var(--purple);
  color: #e0c0ff;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  cursor: pointer;
  margin-bottom: 5px;
  transition: all 0.1s;
}
.hvbtn:hover:not(:disabled) { background: #5e20a0; transform: translateY(-1px); }
.hvbtn:active:not(:disabled) { transform: translateY(1px); }
.hvbtn:disabled { opacity: 0.35; cursor: not-allowed; }
.hvbtn .cost { font-size: 7px; color: #c084fc; }

/* ─── TABS ─── */
.tab-bar { display: flex; gap: 2px; }
.tbtn {
  flex: 1;
  padding: 7px 3px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.tbtn:hover { color: var(--text); }
.tbtn.active { background: var(--accent); color: #111; border-color: var(--accent); }

.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* ─── SCROLL AREA ─── */
.scroll {
  max-height: 280px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}

/* ─── UNLOCK ITEMS ─── */
.unlock-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 6px;
  border: 1px solid var(--border);
  margin-bottom: 3px;
  background: var(--bg2);
  transition: all 0.1s;
}
.unlock-row.buyable {
  border-color: var(--green-dim);
  cursor: pointer;
}
.unlock-row.buyable:hover { border-color: var(--green); background: #0a1a10; }
.unlock-row.owned { border-color: #1a2a1a; opacity: 0.55; }

.uspr {
  width: 34px; height: 34px;
  background-image: url('corns.png');
  background-size: 800% 800%;
  image-rendering: pixelated;
  border: 1px solid var(--border2);
  flex-shrink: 0;
}
.uinfo { flex: 1; min-width: 0; }
.uname { font-size: 7px; margin-bottom: 3px; color: var(--text); }
.ucost { font-size: 6px; }
.ucost.can { color: var(--green); }
.ucost.cant { color: var(--text-dim); }
.ucost.done { color: #4a7a4a; }

/* ─── UPGRADE ITEMS ─── */
.upg-row {
  padding: 8px;
  border: 1px solid var(--border);
  margin-bottom: 4px;
  background: var(--bg2);
  transition: all 0.1s;
}
.upg-row.buyable { border-color: #1a3a1a; cursor: pointer; }
.upg-row.buyable:hover { border-color: var(--green); background: #0a1a10; }
.upg-row.owned { border-color: #1a2000; background: #101400; }
.upg-row.locked { opacity: 0.4; }
.upg-name { font-size: 8px; color: var(--accent); margin-bottom: 4px; }
.upg-desc { font-size: 6px; color: var(--text-dim); margin-bottom: 4px; line-height: 1.7; }
.upg-cost { font-size: 7px; }

/* ─── SKILL TREE ─── */
.skill-sp-bar {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 6px 8px;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 7px;
}

.sk-section { margin-bottom: 8px; }
.sk-section-title {
  font-size: 6px;
  color: var(--text-dim);
  padding: 4px 0;
  margin-bottom: 4px;
  border-bottom: 1px dashed var(--border2);
}

.skill-node {
  padding: 8px;
  border: 1px solid var(--border);
  margin-bottom: 3px;
  background: var(--bg2);
  position: relative;
  transition: all 0.12s;
}
.skill-node.avail { border-color: #1a2a40; cursor: pointer; }
.skill-node.avail:hover { border-color: var(--purple); background: #0f0f20; }
.skill-node.owned { border-color: var(--accent-dim); background: #121000; }
.skill-node.blocked { opacity: 0.35; }
.sk-name { font-size: 8px; color: var(--purple); margin-bottom: 3px; }
.skill-node.owned .sk-name { color: var(--accent); }
.sk-desc { font-size: 6px; color: var(--text-dim); line-height: 1.7; }
.sk-req { font-size: 5px; color: var(--text-dim); margin-top: 3px; }
.sk-cost {
  position: absolute;
  top: 6px; right: 6px;
  font-size: 6px;
  color: var(--purple);
  background: var(--bg);
  padding: 1px 4px;
}

/* ─── FLOATING TEXT ─── */
.float-g {
  position: fixed;
  pointer-events: none;
  font-family: 'Press Start 2P', monospace;
  font-size: 13px;
  color: var(--accent);
  text-shadow: 0 0 12px rgba(245,200,66,0.8);
  z-index: 9999;
  animation: flyUp 1.4s ease-out forwards;
}
@keyframes flyUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  30% { opacity: 1; transform: translateY(-15px) scale(1.1); }
  100% { opacity: 0; transform: translateY(-55px) scale(0.7); }
}

/* ─── TOAST ─── */
.toast {
  position: fixed;
  top: 16px; right: 16px;
  background: var(--panel);
  border: 2px solid var(--accent);
  padding: 10px 16px;
  font-size: 8px;
  color: var(--accent);
  z-index: 9998;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
  max-width: 260px;
  line-height: 1.6;
}
@keyframes toastIn { from{transform:translateX(110%)} to{transform:translateX(0)} }
@keyframes toastOut { from{transform:translateX(0);opacity:1} to{transform:translateX(110%);opacity:0} }

/* ─── OFFLINE MODAL ─── */
.modal-back {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  display: flex; align-items: center; justify-content: center;
  z-index: 9997;
}
.modal-box {
  background: var(--panel);
  border: 3px solid var(--accent);
  padding: 28px 32px;
  text-align: center;
  max-width: 380px;
}
.modal-box h2 {
  font-size: 11px;
  color: var(--accent);
  margin-bottom: 18px;
  text-shadow: 0 0 16px rgba(245,200,66,0.5);
}
.modal-box p { font-size: 8px; color: var(--text-dim); line-height: 2.2; margin-bottom: 20px; }
.modal-box p strong { color: var(--purple); }
.modal-ok {
  background: var(--accent);
  border: 2px solid #c9a000;
  color: #000;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 10px 24px;
  cursor: pointer;
  transition: all 0.1s;
}
.modal-ok:hover { background: #ffd700; }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>
<div class="wrap">

  <!-- TITLE -->
  <div class="title-bar">
    <h1>🌽 옥수수 간디력</h1>
    <span class="save-indicator" id="saveInd">● 자동저장</span>
  </div>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-box">
      <div class="hud-label">💰 보유 G</div>
      <div class="hud-value money" id="moneyDisp">0 G</div>
      <div class="hud-sub">총 획득: <span id="totalMoneyDisp">0</span> G</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">🔮 간디력</div>
      <div class="gandhi-row">
        <span class="gandhi-count" id="gandhiDisp">0 / 200</span>
        <span class="gandhi-timer" id="timerDisp">다음 +1: 10초</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="gandhiBar" style="width:0%"></div></div>
      <div class="hud-sub">누적 사용: <span id="totalGDisp">0</span></div>
    </div>
    <div class="hud-box">
      <div class="hud-label">⚡ 스킬 포인트</div>
      <div class="hud-value sp" id="spDisp">0 SP</div>
      <div class="hud-sub">총 간디 사용 / 100</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-layout">

    <!-- BOARD -->
    <div class="board-panel">
      <div class="board-header">
        <span>🌽 수확 보드</span>
        <span class="board-mode-badge" id="boardBadge">1×1</span>
      </div>
      <div class="board-area">
        <div id="harvestGrid" class="harvest-grid"></div>
      </div>
      <div class="earnings-strip" id="earningsStrip">
        <span class="earn-idle">수확 버튼으로 옥수수를 뽑으세요</span>
      </div>
    </div>

    <!-- RIGHT COLUMN -->
    <div class="right-col">

      <!-- HARVEST -->
      <div class="panel-box">
        <h3>🎯 수확하기</h3>
        <button class="hvbtn" id="hv1" onclick="harvest(1,1)">
          <span>1×1 수확</span><span class="cost">간디력 -1</span>
        </button>
        <button class="hvbtn" id="hv2" onclick="harvest(2,5)" style="display:none">
          <span>2×2 수확</span><span class="cost">간디력 -5</span>
        </button>
        <button class="hvbtn" id="hv4" onclick="harvest(4,20)" style="display:none">
          <span>4×4 수확</span><span class="cost">간디력 -20</span>
        </button>
        <button class="hvbtn" id="hv8" onclick="harvest(8,100)" style="display:none">
          <span>8×8 수확</span><span class="cost">간디력 -100</span>
        </button>
      </div>

      <!-- TABS -->
      <div class="tab-bar">
        <button class="tbtn active" onclick="switchTab('unlock',this)">해금</button>
        <button class="tbtn" onclick="switchTab('upgrade',this)">업그레이드</button>
        <button class="tbtn" onclick="switchTab('skill',this)">스킬트리</button>
      </div>

      <div class="panel-box" style="padding:8px">
        <div id="tab-unlock" class="tab-pane active">
          <div class="scroll" id="unlockList"></div>
        </div>
        <div id="tab-upgrade" class="tab-pane">
          <div class="scroll" id="upgradeList"></div>
        </div>
        <div id="tab-skill" class="tab-pane">
          <div class="skill-sp-bar">
            <span>가용 SP</span>
            <span style="color:var(--purple)" id="freeSPDisp">0</span>
          </div>
          <div class="scroll" id="skillList"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- OFFLINE MODAL -->
<div class="modal-back" id="offModal" style="display:none">
  <div class="modal-box">
    <h2>🕐 오프라인 귀환!</h2>
    <p id="offMsg"></p>
    <button class="modal-ok" onclick="document.getElementById('offModal').style.display='none'">수령하기</button>
  </div>
</div>

// ═══════════════════════════════════════════════
// UTIL
// ═══════════════════════════════════════════════
function fmtG(n) {
  if (n >= 1e18) return (n/1e18).toFixed(2)+'Qi';
  if (n >= 1e15) return (n/1e15).toFixed(2)+'Q';
  if (n >= 1e12) return (n/1e12).toFixed(2)+'T';
  if (n >= 1e9)  return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6)  return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3)  return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toString();
}

function fmtTime(s) {
  if (s < 60) return s+'초';
  if (s < 3600) return Math.floor(s/60)+'분 '+Math.floor(s%60)+'초';
  return Math.floor(s/3600)+'시간 '+Math.floor((s%3600)/60)+'분';
}

function spriteStyle(idx) {
  const c = idx % 8, r = Math.floor(idx / 8);
  return `background-position:${c/7*100}% ${r/7*100}%`;
}

// ═══════════════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════════════
function save() {
  S.lastSave = Date.now();
  localStorage.setItem('cornGandi', JSON.stringify(S));
  const ind = document.getElementById('saveInd');
  ind.classList.add('flash');
  setTimeout(() => ind.classList.remove('flash'), 600);
}

function load() {
  const raw = localStorage.getItem('cornGandi');
  if (!raw) return;
  const loaded = JSON.parse(raw);
  Object.assign(S, loaded);

  // Offline income
  const now = Date.now();
  const elapsed = Math.floor((now - S.lastSave) / 10000); // in 10-second ticks
  if (elapsed > 0) {
    const gained = Math.min(elapsed, S.gandhiMax);
    S.gandhi = Math.min(S.gandhi + gained, S.gandhiMax);
    const msg = document.getElementById('offMsg');
    msg.innerHTML = `오프라인 시간: <strong>${fmtTime(elapsed*10)}</strong><br>간디력 <strong>+${gained}</strong> 획득!<br>(최대 ${S.gandhiMax} 제한)`;
    document.getElementById('offModal').style.display = 'flex';
  }
  S.lastSave = now;
}

// ═══════════════════════════════════════════════
// RECALCULATE DERIVED STATS
// ═══════════════════════════════════════════════
function recalc() {
  let mult = 1, floor = 0, bias = 0;
  for (const u of UPGRADES_DEF) {
    if (!S.upg[u.id]) continue;
    if (u.eff === 'mult')  mult  *= u.val;
    if (u.eff === 'floor') floor  = Math.max(floor, u.val);
    if (u.eff === 'bias')  bias   = Math.max(bias,  u.val);
  }
  S.mult  = mult;
  S.floor = floor;
  S.bias  = bias;
  S.chain  = !!S.skills['ch1'];
  S.chain2 = !!S.skills['ch2'];

  // Harvest buttons visibility
  if (S.skills['h2']) document.getElementById('hv2').style.display = '';
  if (S.skills['h4']) document.getElementById('hv4').style.display = '';
  if (S.skills['h8']) document.getElementById('hv8').style.display = '';
}

// ═══════════════════════════════════════════════
// SP
// ═══════════════════════════════════════════════
function totalSP()  { return Math.floor(S.totalGUsed / 100); }
function usedSP()   { return SKILLS_DEF.filter(sk => S.skills[sk.id]).reduce((a,b) => a+b.cost, 0); }
function freeSP()   { return totalSP() - usedSP(); }

// ═══════════════════════════════════════════════
// DRAW CORN
// ═══════════════════════════════════════════════
function drawOneCorn() {
  const pool = S.unlocked;
  const n = pool.length;
  const floorOff = Math.min(S.floor, n - 1);

  // Build weighted pool
  const weighted = [];
  for (let i = floorOff; i < n; i++) {
    // Bias: higher corns get more weight exponentially
    const t = (i - floorOff) / Math.max(n - floorOff - 1, 1); // 0..1
    const w = Math.max(1, Math.pow(1 + t, S.bias * 2));
    for (let j = 0; j < Math.round(w * 10); j++) weighted.push(pool[i]);
  }
  return weighted[Math.floor(Math.random() * weighted.length)];
}

// ═══════════════════════════════════════════════
// CHAIN CALCULATION
// ═══════════════════════════════════════════════
function calcChains(board, cols) {
  const n = board.length, rows = n / cols;
  const bonuses = new Array(n).fill(1);
  if (!S.chain || n <= 1) return bonuses;

  const visited = new Array(n).fill(false);
  function adj(i) {
    const r = Math.floor(i/cols), c = i%cols, res = [];
    if (r > 0) res.push(i-cols); if (r < rows-1) res.push(i+cols);
    if (c > 0) res.push(i-1);   if (c < cols-1)  res.push(i+1);
    return res;
  }
  for (let i = 0; i < n; i++) {
    if (visited[i]) continue;
    const comp = [i]; visited[i] = true;
    for (let qi = 0; qi < comp.length; qi++) {
      for (const nb of adj(comp[qi])) {
        if (!visited[nb] && board[nb] === board[comp[qi]]) {
          visited[nb] = true; comp.push(nb);
        }
      }
    }
    const bonus = S.chain2 ? comp.length * 1.5 : comp.length;
    for (const idx of comp) bonuses[idx] = bonus;
  }
  return bonuses;
}

// ═══════════════════════════════════════════════
// HARVEST
// ═══════════════════════════════════════════════
function harvest(dim, cost) {
  if (S.gandhi < cost) { toast('간디력이 부족합니다!'); return; }
  S.gandhi -= cost;
  S.totalGUsed += cost;

  const size = dim * dim;
  const board = Array.from({length: size}, drawOneCorn);
  S.board = board;

  const bonuses = calcChains(board, dim);
  let total = 0;
  for (let i = 0; i < size; i++) {
    total += CORNS[board[i]].v * S.mult * bonuses[i];
  }
  total = Math.floor(total);
  S.money += total;
  S.totalMoney += total;

  renderBoard(board, dim, bonuses);

  const strip = document.getElementById('earningsStrip');
  strip.innerHTML = `<span class="earn-value">+${fmtG(total)} G</span>`;

  // Floating text
  const hv = document.getElementById('hv1');
  const rc = hv.getBoundingClientRect();
  floatText(`+${fmtG(total)}G`, rc.left + rc.width/2, rc.top);

  updateHUD();
  renderUnlocks();
  renderUpgrades();
  renderSkills();
  save();
}

// ═══════════════════════════════════════════════
// RENDER BOARD
// ═══════════════════════════════════════════════
function renderBoard(board, dim, bonuses) {
  const grid = document.getElementById('harvestGrid');
  const MAXPX = 500;
  const cell = Math.min(Math.floor(MAXPX / dim), 72);
  grid.style.gridTemplateColumns = `repeat(${dim}, ${cell}px)`;
  grid.style.width = (cell * dim + (dim-1)*3) + 'px';
  grid.innerHTML = '';

  board.forEach((ci, i) => {
    const slot = document.createElement('div');
    slot.className = 'corn-slot pop' + (bonuses[i] > 1 ? ' chain-bonus' : '');
    slot.style.cssText = `width:${cell}px;height:${cell}px;animation-delay:${i*0.015}s`;

    const spr = document.createElement('div');
    spr.className = 'corn-sprite';
    spr.setAttribute('style', spriteStyle(ci));
    slot.appendChild(spr);

    if (bonuses[i] > 1) {
      const badge = document.createElement('div');
      badge.className = 'chain-badge';
      badge.textContent = '×' + (Number.isInteger(bonuses[i]) ? bonuses[i] : bonuses[i].toFixed(1));
      slot.appendChild(badge);
    }

    const tip = document.createElement('div');
    tip.className = 'slot-tip';
    tip.textContent = CORNS[ci].name + ' (' + fmtG(CORNS[ci].v * S.mult) + 'G)';
    slot.appendChild(tip);

    grid.appendChild(slot);
  });

  document.getElementById('boardBadge').textContent = dim === 1 ? '1×1' : `${dim}×${dim}`;
}

// ═══════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════
function updateHUD() {
  document.getElementById('moneyDisp').textContent  = fmtG(S.money) + ' G';
  document.getElementById('totalMoneyDisp').textContent = fmtG(S.totalMoney);
  document.getElementById('gandhiDisp').textContent = `${Math.floor(S.gandhi)} / ${S.gandhiMax}`;
  document.getElementById('gandhiBar').style.width  = (S.gandhi / S.gandhiMax * 100) + '%';
  document.getElementById('totalGDisp').textContent = fmtG(S.totalGUsed);

  const fp = freeSP();
  document.getElementById('spDisp').textContent   = fp + ' SP';
  document.getElementById('freeSPDisp').textContent = fp;

  // disable harvest buttons if not enough gandhi
  const map = [['hv1',1],['hv2',5],['hv4',20],['hv8',100]];
  map.forEach(([id, cost]) => {
    const btn = document.getElementById(id);
    if (btn) btn.disabled = S.gandhi < cost;
  });
}

// ═══════════════════════════════════════════════
// RENDER UNLOCKS
// ═══════════════════════════════════════════════
function renderUnlocks() {
  const list = document.getElementById('unlockList');
  list.innerHTML = '';
  for (let i = 0; i < CORNS.length; i++) {
    const owned   = S.unlocked.includes(i);
    const prev    = i === 0 || S.unlocked.includes(i-1);
    const isNext  = !owned && prev;
    if (!owned && !isNext) continue;

    const canBuy  = !owned && isNext && S.money >= CORNS[i].u;
    const row = document.createElement('div');
    row.className = 'unlock-row ' + (owned ? 'owned' : (canBuy ? 'buyable' : ''));

    const spr = document.createElement('div');
    spr.className = 'uspr';
    spr.setAttribute('style', spriteStyle(i));
    row.appendChild(spr);

    const info = document.createElement('div');
    info.className = 'uinfo';
    info.innerHTML = `<div class="uname">${CORNS[i].name}</div>
      <div class="ucost ${owned?'done':(S.money>=CORNS[i].u?'can':'cant')}">
        ${owned ? '✓ 해금 | '+fmtG(CORNS[i].v)+'G' : '해금 비용: '+fmtG(CORNS[i].u)+'G'}
      </div>`;
    row.appendChild(info);

    if (canBuy) row.addEventListener('click', () => buyCorn(i));
    list.appendChild(row);
  }
}

function buyCorn(i) {
  if (S.unlocked.includes(i) || S.money < CORNS[i].u) return;
  S.money -= CORNS[i].u;
  S.unlocked.push(i);
  S.unlocked.sort((a,b)=>a-b);
  toast('🌽 ' + CORNS[i].name + ' 해금!');
  updateHUD(); renderUnlocks(); save();
}

// ═══════════════════════════════════════════════
// RENDER UPGRADES
// ═══════════════════════════════════════════════
function renderUpgrades() {
  const list = document.getElementById('upgradeList');
  list.innerHTML = '';
  for (const u of UPGRADES_DEF) {
    const owned   = !!S.upg[u.id];
    const reqMet  = !u.req || S.upg[u.req];
    const canBuy  = !owned && reqMet && S.money >= u.cost;
    const row = document.createElement('div');
    row.className = 'upg-row ' + (owned?'owned':(canBuy?'buyable':(!reqMet?'locked':'')));
    row.innerHTML = `<div class="upg-name">${owned?'✓ ':''} ${u.name}</div>
      <div class="upg-desc">${u.desc}</div>
      <div class="upg-cost" style="color:${owned?'var(--accent-dim)':(canBuy?'var(--green)':(!reqMet?'var(--text-dim)':'#664'))}">
        ${owned?'구매 완료':(reqMet?fmtG(u.cost)+' G':'🔒 이전 업그레이드 필요')}
      </div>`;
    if (canBuy) row.addEventListener('click', () => buyUpgrade(u.id));
    list.appendChild(row);
  }
}

function buyUpgrade(id) {
  const u = UPGRADES_DEF.find(x=>x.id===id);
  if (!u || S.upg[id] || S.money < u.cost) return;
  if (u.req && !S.upg[u.req]) return;
  S.money -= u.cost;
  S.upg[id] = true;
  recalc();
  toast('⬆ ' + u.name + ' 구매!');
  updateHUD(); renderUpgrades(); save();
}

// ═══════════════════════════════════════════════
// RENDER SKILLS
// ═══════════════════════════════════════════════
function renderSkills() {
  const list = document.getElementById('skillList');
  list.innerHTML = '';
  // Group by grp
  const groups = [...new Set(SKILLS_DEF.map(s=>s.grp))];
  for (const grp of groups) {
    const sec = document.createElement('div');
    sec.className = 'sk-section';
    const title = document.createElement('div');
    title.className = 'sk-section-title';
    title.textContent = grp;
    sec.appendChild(title);

    for (const sk of SKILLS_DEF.filter(s=>s.grp===grp)) {
      const owned  = !!S.skills[sk.id];
      const reqMet = sk.req.every(r=>S.skills[r]);
      const canBuy = !owned && reqMet && freeSP() >= sk.cost;
      const node = document.createElement('div');
      node.className = 'skill-node ' + (owned?'owned':(canBuy?'avail':'blocked'));
      node.innerHTML = `
        <span class="sk-cost">${owned?'✓':sk.cost+' SP'}</span>
        <div class="sk-name">${sk.name}</div>
        <div class="sk-desc">${sk.desc}</div>
        ${sk.req.length?`<div class="sk-req">필요: ${sk.req.map(r=>SKILLS_DEF.find(s=>s.id===r)?.name).join(', ')}</div>`:''}
      `;
      if (canBuy) node.addEventListener('click', () => buySkill(sk.id));
      sec.appendChild(node);
    }
    list.appendChild(sec);
  }
}

function buySkill(id) {
  const sk = SKILLS_DEF.find(s=>s.id===id);
  if (!sk || S.skills[id]) return;
  if (!sk.req.every(r=>S.skills[r])) return;
  if (freeSP() < sk.cost) { toast('SP가 부족합니다!'); return; }
  S.skills[id] = true;

  // Apply effects
  if (id === 'gm1') S.gandhiMax += 100;
  if (id === 'gm2') S.gandhiMax += 200;
  if (id === 'gm3') S.gandhiMax += 500;
  if (id === 'gm4') S.gandhiMax += 2000;
  if (id === 'h2') document.getElementById('hv2').style.display = '';
  if (id === 'h4') document.getElementById('hv4').style.display = '';
  if (id === 'h8') document.getElementById('hv8').style.display = '';
  recalc();

  toast('⚡ ' + sk.name + ' 해금!');
  updateHUD(); renderSkills(); save();
}

// ═══════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════
function switchTab(id, btn) {
  document.querySelectorAll('.tab-pane').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tbtn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if (id==='upgrade') renderUpgrades();
  if (id==='skill')   renderSkills();
}

// ═══════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════
function toast(msg) {
  document.querySelectorAll('.toast').forEach(el=>el.remove());
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

function floatText(txt, x, y) {
  const el = document.createElement('div');
  el.className = 'float-g';
  el.textContent = txt;
  el.style.left = (x - 30) + 'px';
  el.style.top  = (y - 10) + 'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1400);
}

// ═══════════════════════════════════════════════
// GAME TICK
// ═══════════════════════════════════════════════
let lastTick = Date.now();
let tickAccum = 0;
let timerCountdown = 10;

function tick() {
  const now = Date.now();
  const dt  = (now - lastTick) / 1000;
  lastTick  = now;

  tickAccum += dt;
  timerCountdown -= dt;

  if (tickAccum >= 10) {
    const ticks = Math.floor(tickAccum / 10);
    tickAccum  -= ticks * 10;
    S.gandhi    = Math.min(S.gandhi + ticks, S.gandhiMax);
    timerCountdown = 10 - tickAccum;
    save();
  }

  // Update countdown display
  const cd = Math.max(0, timerCountdown);
  document.getElementById('timerDisp').textContent =
    S.gandhi >= S.gandhiMax ? '꽉 참!' : `다음 +1: ${cd.toFixed(1)}초`;

  updateHUD();
  requestAnimationFrame(tick);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init() {
  load();
  recalc();

  // Initial board
  const grid = document.getElementById('harvestGrid');
  grid.style.gridTemplateColumns = 'repeat(1,72px)';
  const slot = document.createElement('div');
  slot.className = 'corn-slot';
  slot.style.cssText = 'width:72px;height:72px;opacity:0.15';
  const spr = document.createElement('div');
  spr.className = 'corn-sprite';
  spr.setAttribute('style', spriteStyle(0));
  slot.appendChild(spr);
  grid.appendChild(slot);

  updateHUD();
  renderUnlocks();
  renderUpgrades();
  renderSkills();

  lastTick = Date.now();
  requestAnimationFrame(tick);
}

init();
</script>
